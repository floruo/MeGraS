syntax = "proto3";

package org.megras.util.services;

import "google/protobuf/struct.proto";

// DoclingService extracts content from PDF files.
service DoclingService {
  // Extracts plain text from a PDF file.
  rpc ExtractText (PdfRequest) returns (ExtractTextResponse);

  // Extracts figures metadata from a PDF file as a JSON array of objects.
  rpc ExtractFigures (PdfRequest) returns (ExtractFiguresResponse);

  // Extracts tables metadata from a PDF file as a JSON array of objects.
  rpc ExtractTables (PdfRequest) returns (ExtractTablesResponse);
}

// Request message containing the PDF bytes.
message PdfRequest {
  bytes pdf_data = 1; // Raw PDF file bytes
}

// Response with extracted plain text.
message ExtractTextResponse {
  string text = 1;
}

// Response with extracted figures as a JSON array (each item is an object), using protobuf Struct/ListValue.
message ExtractFiguresResponse {
  google.protobuf.ListValue figures = 1;
}

// Response with extracted tables as a JSON array (each item is an object), using protobuf Struct/ListValue.
message ExtractTablesResponse {
  google.protobuf.ListValue tables = 1;
}
